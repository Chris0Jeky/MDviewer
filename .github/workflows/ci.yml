name: CI

# Product-correctness gate for MDviewer. The crown jewel is the E2E job: it runs the real
# Chromium pagination/export suite, including the no-slice guarantee (tests/e2e/nocutoff.spec.ts)
# that defines this project. Keep this workflow green before merging any PR.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# One in-flight run per ref; newer PR pushes cancel stale runs. Do NOT cancel post-merge
# runs on main — those are the commits we most want a completed green signal for.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: Typecheck · Lint · Unit · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Validate both the declared engine floor (latest 20.x is >= 20.19, vite 8's floor)
        # and the active LTS used by CI's e2e job.
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build

  e2e:
    name: E2E (Playwright · Chromium · production build)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
      # On a cache hit the browser binary is already present, so this only installs OS deps;
      # on a miss it downloads Chromium too. Either way OS libs are ensured via --with-deps.
      - name: Install Playwright Chromium (+ OS deps)
        run: npx playwright install --with-deps chromium
      # Build the real artifact, then run e2e against `vite preview` so the no-slice guarantee
      # and both export paths are validated on the shipped rolldown bundle, not just dev mode.
      - name: Build
        run: npm run build
      - name: E2E tests (real Chromium, production bundle, incl. no-slice guarantee)
        run: npm run test:e2e
        env:
          E2E_TARGET: preview
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7
